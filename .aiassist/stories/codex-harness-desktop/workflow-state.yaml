notes: |
  引擎已定：自建 FlowEngine（进程内执行 agent/computer-use）。
  技术栈已定：Electron + React + TypeScript + TailwindCSS + React Flow。
  Agent 执行已定：Node.js 引擎进程内调 Agent SDK / Codex app-server。
  持久化已定：settings 用 JSON 文件；项目/流程/任务/执行/日志用 SQLite。
  调度策略已定：应用内 cron 调度器，应用关闭则错过的任务不补执行。
  FlowEngine 错误策略已定：事件驱动；单个节点失败重试一次，再次失败则整个 Execution 失败。
  待办：
  1. 引入 SQLite 并迁移 Project/Flow/Task/Skill 服务到持久化存储。
  2. 实现 FlowEngine 骨架（拓扑排序、事件总线、节点执行器）。
  3. 实现 AgentAdapter spike，验证 Claude Code / Codex 调用协议。
  4. 实现 ScheduleService 和 cron 调度器。
  5. 搭建 Electron 主进程 + React 渲染进程最小壳。
