notes: |
  引擎已定：自建 FlowEngine（进程内执行 agent/computer-use）。
  技术栈已定：Electron + React + TypeScript + TailwindCSS + React Flow。
  Agent 执行已定：Node.js 引擎进程内调 Agent SDK / Codex app-server。
  持久化已定：settings 用 JSON 文件；项目/流程/任务/执行/日志用 SQLite。
  调度策略已定：应用内 cron 调度器，应用关闭则错过的任务不补执行。
  FlowEngine 边界已定：纯函数，由 TaskService 注入 flow/project/inputVariables/executors/onEvent/options。
  触发入口已定：TaskService 是创建 Execution 的唯一入口；ScheduleService 只发 schedule:triggered 事件。
  错误策略已定：executor 返回 success/error/fatal；error 重试一次，fatal 直接失败。
  数据流已定：节点接收全量累积上下文。
  Agent 边界已定：AgentAdapter 被 agentExecutor 封装，对 FlowEngine 透明。
  图结构已定：允许循环图；Condition/ForEach/While 为 MVP 基础节点；通过 maxDepth/maxIterations 防止无限循环。
  表达式已定：Condition / While 使用 JavaScript 表达式。
  UX 设计决策已回流 PRD（2026-07-06）：Tasks/Executions 分离、Flows 列表简化、Skills 多源安装、Project 详情配置 Skills、Dashboard/语言/Density 等。
  REQ 已同步更新至 REQ-025，requirements-v1.hash 已重新生成。
  因 PRD/REQ 变化，先前 assertion-signoff 需重新签核受影响 REQ。
