story_name: Codex Harness Desktop App
intention: 把需要人类判断的环节交给 agent/codex 节点，把流程化步骤交给应用稳定执行，实现可定时触发、可远程观察的自动化工作流。
current_phase: BUILD
attempt: 1
blockers: []
