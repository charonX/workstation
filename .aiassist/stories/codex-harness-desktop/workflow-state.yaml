  - {at: 2026-07-01, from: DESIGN, to: DESIGN, note: "探索 n8n 作执行后端（按块回流）：n8n 有 Public API/JSON/cron/SQLite 日志，许可证允许内部自用。但第一性原理复盘后回滚——computer-use 是主要功能、必须本地交互式桌面执行，n8n（headless/远程）无法承载，每个 agent 步骤都要 Wait+Webhook 握手，在产品核心位置加摩擦。引擎块重新稳定回自建 FlowEngine。未建 archive，初衷不变。"}
  - {at: 2026-07-01, from: DESIGN, to: DESIGN, note: "n8n 回滚完成。always-on + computer-use 的真实需求 = 引擎跑在 always-on 的 GUI 机器上（或先笔记本、后常驻桌面机），自建引擎进程内直跑 agent，无握手。下次别再绕回 n8n。"}
