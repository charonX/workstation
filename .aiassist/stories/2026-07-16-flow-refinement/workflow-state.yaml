notes: |
  继承自 codex-harness-desktop 已沉淀的 FlowEngine 基础：
  - 引擎为自建 FlowEngine，进程内执行 agent/computer-use。
  - 允许循环图；Condition/ForEach/While 为 MVP 基础节点。
  - 通过 maxDepth/maxIterations 防止无限循环。
  - 表达式使用 JavaScript。
  本 story 重点是对这些基础能力做细化与扩展。
  签核决策：校验放 service 层；错误格式结构化；Condition 用 fullName，Agent prompt 用 {{fullName}}；mock 通过 options.executors 注入；新建 execution_nodes 表；E2E 只签核行为级断言。
  tech-design 决策（2026-07-17 补档）：Agent SDK = @anthropic-ai/claude-agent-sdk（ADR-005）；凭证复用本机 claude code，应用不存储；config.options 仅透传 systemPrompt/maxTurns；日志清理 = purgeExpiredExecutions 滚动 7×24h，server 启动 + 每日 cron 双触发；触发方式在节点外（手动=debug endpoint，定时=schedules 实体），webhook 与手动变量表单为范围外。BUILD 第一切片：packaged 形态 SDK 子进程 spike。
